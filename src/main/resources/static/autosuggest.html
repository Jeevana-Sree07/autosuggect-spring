         <script>
            function getSearchSugssestins(){
                var searchBox = document.getElementById("searchbox");
                var searchsuggestions = documet.getElementById("search-suggestions");
                var userInput = searchBox.value;
                if(userInput.trim() === "")return;
                var URL1= "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var URL3= "ba&algorithm=brute&limit=10&weighted=false"
                var URL = URL1 + userInput + URL3;
            fetch(URL){
                .then(function(response){
                    return response.json();
                })
                .then(function(data){
                    var searchResults = "";
                    var suggestions = data.results;
                    for(var i=0; i<data.count; i++){
                        searchResults+= "<div class='suggestion'>"+
                            suggestions[i].text +
                             "</div>";
                    } 
                    searchsuggestions.innerHTML = searchResults;
                })
            }            }
